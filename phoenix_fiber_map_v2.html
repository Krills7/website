<title>Phoenix Fiber Build Map</title>

<style>
:root{--bg:#0d1117;--surface:#161b22;--border:#21262d;--text:#e6edf3;--muted:#8b949e;--accent:#00ff88;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;z-index:1000;}
.header-left{display:flex;align-items:center;gap:14px;}
.logo-dot{width:10px;height:10px;background:var(--accent);border-radius:50%;box-shadow:0 0 8px var(--accent);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 8px var(--accent);}50%{opacity:.6;box-shadow:0 0 16px var(--accent);}}
h1{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--accent);}
.subtitle{font-size:11px;color:var(--muted);letter-spacing:.04em;}
.stats-bar{display:flex;gap:20px;align-items:center;}
.stat{text-align:right;}
.stat-num{font-family:'Space Mono',monospace;font-size:16px;font-weight:700;color:var(--accent);line-height:1;}
.stat-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;}
.main{display:flex;flex:1;min-height:0;}
#map{flex:1;min-height:0;background:#0d1117;}
.leaflet-tile-pane{filter:brightness(.6) saturate(.5) invert(1) hue-rotate(180deg);}
.sidebar{width:280px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;}
.sidebar-section{padding:14px 16px;border-bottom:1px solid var(--border);}
.section-title{font-family:'Space Mono',monospace;font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);margin-bottom:10px;}
.result-row{display:flex;justify-content:space-between;font-size:12px;padding:2px 0;}
.result-val{font-family:'Space Mono',monospace;color:var(--accent);}
.legend-item{display:flex;align-items:center;gap:8px;padding:4px 0;cursor:pointer;}
.legend-item:hover{background:rgba(255,255,255,.04);padding-left:4px;}
.legend-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.legend-label{font-size:12px;color:var(--text);flex:1;}
.legend-count{font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);}
.search-wrap{padding:10px 16px;border-bottom:1px solid var(--border);}
.search-input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:6px 10px;font-size:12px;font-family:'DM Sans',sans-serif;border-radius:4px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.feed{flex:1;overflow-y:auto;}
.feed::-webkit-scrollbar{width:4px;}
.feed::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.feed-item{padding:10px 16px;border-bottom:1px solid rgba(255,255,255,.04);cursor:pointer;transition:background .15s;}
.feed-item:hover,.feed-item.active{background:rgba(255,255,255,.05);}
.feed-permit{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px;}
.feed-location{font-size:12px;font-weight:500;color:var(--text);margin-bottom:3px;line-height:1.3;}
.feed-status{display:inline-block;font-size:10px;padding:1px 6px;border-radius:2px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;}
.leaflet-popup-content-wrapper{background:var(--surface)!important;border:1px solid var(--border)!important;border-radius:6px!important;box-shadow:0 8px 24px rgba(0,0,0,.5)!important;color:var(--text)!important;}
.leaflet-popup-tip{background:var(--surface)!important;}
.leaflet-popup-content{margin:12px 14px!important;font-family:'DM Sans',sans-serif!important;}
.popup-permit{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:4px;}
.popup-location{font-size:13px;font-weight:600;color:var(--text);margin-bottom:6px;line-height:1.3;}
.popup-desc{font-size:11px;color:var(--muted);line-height:1.5;margin-bottom:6px;}
.popup-status{display:inline-block;font-size:10px;padding:2px 7px;border-radius:3px;font-weight:600;text-transform:uppercase;}
.popup-date{font-size:10px;color:var(--muted);margin-top:5px;font-family:'Space Mono',monospace;}
.no-geocode{font-size:11px;color:var(--muted);padding:10px 16px;font-style:italic;}
</style>
</head>

</header>

</div>

function getLon(s){
  s=s.trim().toUpperCase();
  if(NS[s])return NS[s];
  // numbered: extract digits + type
  const m=s.match(/^(\d+)(?:ST|ND|RD|TH)?\s*(AVE|ST|PL|DR|LN|CT|WAY|BLVD|RD)?$/);
  if(m){
    const n=parseInt(m[1]),t=(m[2]||'ST').toUpperCase();
    return t==='AVE'?-112.074-n*0.00202:-112.074+n*0.00225;
  }
  return null;
}
function getLat(s){
  s=s.trim().toUpperCase();
  return EW[s]||null;
}
function geocode(loc){
  const u=loc.trim().toUpperCase();
  // 1. Address: "12345 N|S|E|W STREET" or "12345 NORTH|SOUTH|EAST|WEST STREET"
  let m=u.match(/^(\d+)\s+(NORTH|SOUTH|EAST|WEST|N|S|E|W)\s+(.+)$/);
  if(m){
    const n=parseInt(m[1]),dir=m[2],st=m[3];
    const d=dir.charAt(0);
    if(d==='N'||d==='S'){
      const lat=d==='N'?33.448+n*0.00001317:33.448-n*0.00001317;
      const lon=getLon(st);
      if(lon)return[lat,lon];
    }else{
      const lon=d==='E'?-112.074+(n/100)*0.00225:-112.074-(n/100)*0.00202;
      const lat=getLat(st);
      if(lat)return[lat,lon];
    }
  }
  // 2. FROM-TO: "MAIN FROM X TO Y"
  m=u.match(/^(.+?)\s+FROM\s+(.+?)\s+TO\s+(.+)$/);
  if(m){
    const main=m[1].trim(),c1=m[2].trim(),c2=m[3].trim();
    const mlat=getLat(main),mlon=getLon(main);
    if(mlat){
      const l1=getLon(c1),l2=getLon(c2);
      if(l1&&l2)return[mlat,(l1+l2)/2];
      if(l1)return[mlat,l1];if(l2)return[mlat,l2];
    }
    if(mlon){
      const l1=getLat(c1),l2=getLat(c2);
      if(l1&&l2)return[(l1+l2)/2,mlon];
      if(l1)return[l1,mlon];if(l2)return[l2,mlon];
    }
  }
  // 3. Intersection "A & B" or comma list
  const parts=u.split(/\s*[&,]\s*/);
  for(let i=0;i<parts.length;i++){
    for(let j=i+1;j<parts.length;j++){
      const a=parts[i].trim(),b=parts[j].trim();
      const la=getLat(a),loa=getLon(a),lb=getLat(b),lob=getLon(b);
      if(la&&lob)return[la,lob];
      if(lb&&loa)return[lb,loa];
    }
  }
  return null;
}

// ── Map Init ──────────────────────────────────────────────────────────────────
const map=L.map('map',{center:[33.48,-112.07],zoom:11,zoomControl:false});
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OpenStreetMap contributors',maxZoom:19}).addTo(map);

// ── Legend ────────────────────────────────────────────────────────────────────
const counts={};
FIBER_DATA.forEach(d=>{counts[d.status]=(counts[d.status]||0)+1;});
const legendEl=document.getElementById('legend');
const layerGroups={};
STATUS_ORDER.forEach(s=>{
  if(!counts[s])return;
  layerGroups[s]=L.layerGroup().addTo(map);
  const col=STATUS_COLORS[s]||'#aaa';
  const item=document.createElement('div');item.className='legend-item';
  item.innerHTML=`<div class="legend-dot" style="background:${col};box-shadow:0 0 4px ${col}88"></div><span class="legend-label">${s}</span><span class="legend-count">${counts[s]}</span>`;
  item.addEventListener('click',()=>{
    const lg=layerGroups[s];
    if(map.hasLayer(lg)){map.removeLayer(lg);item.style.opacity='0.4';}
    else{map.addLayer(lg);item.style.opacity='1';}
  });
  legendEl.appendChild(item);
});

// ── Plot Markers ─────────────────────────────────────────────────
const feedEl=document.getElementById('feed');
let mapped=0,failed=0;
const allItems=[];

// Pre-sort: newest first by date, fallback to original order
function parseDate(d) {
  const parts = d.split('-');
  return new Date(parseInt(parts[0]), parseInt(parts[1])-1, parseInt(parts[2]));
}

let sortAsc = false; // default: newest first
let sortedData = [...FIBER_DATA].sort((a, b) => {
  const da = parseDate(a.date || '2000-01-01');
  const db = parseDate(b.date || '2000-01-01');
  return sortAsc ? da - db : db - da;
});

function renderMarkers() {
  // Clear existing
  feedEl.innerHTML = '';
  Object.values(layerGroups).forEach(lg => lg.clearLayers());
  allItems.length = 0;
  mapped = 0;
  failed = 0;

  sortedData.forEach(d => {
    const coords = d.lat !== undefined ? [d.lat, d.lng] : geocode(d.location);
    const col = STATUS_COLORS[d.status] || '#aaa';
    let marker = null;
    
    if (coords) {
      const icon = L.divIcon({
        className: '',
        html: `<div style="width:10px;height:10px;background:${col};border-radius:50%;border:2px solid rgba(0,0,0,0.5);box-shadow:0 0 5px ${col}99;cursor:pointer"></div>`,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });
      marker = L.marker(coords, { icon });
      const dateStr = d.date ? `<div class="popup-date">${d.date}</div>` : '';
      marker.bindPopup(
        `<div class="popup-permit">${d.permit}</div><div class="popup-location">${d.location}</div><div class="popup-desc">${d.desc}</div><span class="popup-status" style="background:${col}22;color:${col}">${d.status}</span>${dateStr}`,
        { maxWidth: 260 }
      );
      if (layerGroups[d.status]) marker.addTo(layerGroups[d.status]);
      mapped++;
    } else {
      failed++;
    }

    // Feed item
    const item = document.createElement('div');
    item.className = 'feed-item';
    item.innerHTML = `<div class="feed-permit">${d.permit}</div><div class="feed-location">${d.location}</div><span class="feed-status" style="background:${col}22;color:${col}">${d.status}</span>`;
    item.dataset.search = (d.permit + ' ' + d.location + ' ' + d.desc + ' ' + d.status).toLowerCase();
    item.addEventListener('click', () => {
      allItems.forEach(x => x.classList.remove('active'));
      item.classList.add('active');
      if (marker) { map.setView(marker.getLatLng(), 15); marker.openPopup(); }
    });
    feedEl.appendChild(item);
    allItems.push(item);
  });

  // Stats
  document.getElementById('total-count').textContent = FIBER_DATA.length;
  document.getElementById('mapped-count').textContent = mapped;
  document.getElementById('fail-count').textContent = failed;
}

renderMarkers();

// ── Search ────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', function() {
  const q = this.value.toLowerCase().trim();
  allItems.forEach(item => {
    item.style.display = (!q || item.dataset.search.includes(q)) ? '' : 'none';
  });
});

// ── Sort Toggle ──────────────────────────────────────────────
const sortToggle = document.createElement('button');
sortToggle.textContent = 'Sort: Newest First ↓';
sortToggle.style.cssText = 'font-family:Space Mono,monospace;font-size:10px;background:var(--bg);color:var(--accent);border:1px solid var(--border);padding:4px 8px;border-radius:4px;cursor:pointer;width:100%;margin-top:6px;letter-spacing:.04em;';
sortToggle.addEventListener('click', () => {
  sortAsc = !sortAsc;
  sortToggle.textContent = sortAsc ? 'Sort: Oldest First ↑' : 'Sort: Newest First ↓';
  sortedData = [...FIBER_DATA].sort((a, b) => {
    const da = parseDate(a.date || '2000-01-01');
    const db = parseDate(b.date || '2000-01-01');
    return sortAsc ? da - db : db - da;
  });
  renderMarkers();
  // Re-apply current search
  const searchInput = document.getElementById('search');
  const evt = new Event('input');
  searchInput.dispatchEvent(evt);
});

// Add sort toggle below search
document.querySelector('.search-wrap').appendChild(sortToggle);
</script>
